name = "r2-proxy"
main = "src/index.js"
compatibility_date = "2026-06-15"

# One Worker bound to 4 R2 buckets.
[[r2_buckets]]
binding = "BLUEARCHIVE"
bucket_name = "bluearchive"

[[r2_buckets]]
binding = "DNF"
bucket_name = "dnf"

[[r2_buckets]]
binding = "MOSHEN"
bucket_name = "moshen"

[[r2_buckets]]
binding = "CATDOG"
bucket_name = "catdog"

# URL path alias -> binding name
[vars]
BUCKET_MAP = '{"bluearchive":"BLUEARCHIVE","dnf":"DNF","moshen":"MOSHEN","catdog":"CATDOG"}'
DEFAULT_ALIAS = "dnf"
